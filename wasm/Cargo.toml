[package]
name = "ergot-demo-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
ergot = { path = "../../../rust/ergot/crates/ergot", default-features = false, features = ["tokio-std"] }
getrandom = { version = "0.3", features = ["wasm_js"] }
js-sys = "0.3.92"
tokio_with_wasm = { version = "0.9.0", features = ["rt", "time"] }
wasm-bindgen = "0.2.115"
wasm-bindgen-futures = "0.4.65"
